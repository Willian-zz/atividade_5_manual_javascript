    <nav>
        <div class="nav-bar">
            <i class="fa-brands fa-square-js"></i>
        </div>
    </nav>
    
    <h1 class="title">Exemplo de script dentro do html</h1>
    <p class="info-text">Primeiro se utiliza da tag <strong>"&ltscript&gt"</strong> para identificar o inicio de um comando na linguagem <strong>JavaScript</strong>, e quando terminar, é necessário adicionar a tag <strong>"&lt/script&gt"</strong> para sinalizar o fechamento.</p>
    
    <div class="code-card">
        <p> <span class="tag">&ltscript&gt</span> <br><span class="function">console.log(<span class="text">"Hello World"</span>); <br><span class="tag">&lt/script&gt</span></p>
    </div>
 
</body>
</html>
